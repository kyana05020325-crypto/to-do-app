<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do アプリ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="app">
            <h1>📝 My To Do List</h1>

            <div class="input-section">
                <input
                    type="text"
                    id="taskInput"
                    class="task-input"
                    placeholder="新しいタスクを入力..."
                    autocomplete="off"
                >
                <button id="addBtn" class="add-btn">追加</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">すべて</button>
                <button class="filter-btn" data-filter="active">未完了</button>
                <button class="filter-btn" data-filter="completed">完了</button>
            </div>

            <ul id="taskList" class="task-list"></ul>

            <div class="stats">
                <span id="activeCount">0</span> 個の未完了タスク
                <button id="clearBtn" class="clear-btn">完了したタスクを削除</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
