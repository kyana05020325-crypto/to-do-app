<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do アプリ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 認証UI -->
    <div id="authUI" class="auth-container" style="display: none;">
        <div class="auth-box">
            <h1>🔐 To Do アプリ</h1>

            <div class="auth-tabs">
                <button class="auth-tab-btn active" onclick="switchAuthTab('login')">ログイン</button>
                <button class="auth-tab-btn" onclick="switchAuthTab('signup')">サインアップ</button>
            </div>

            <!-- ログインフォーム -->
            <div id="loginTab" class="auth-tab-content active">
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" class="auth-input">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="loginPassword" placeholder="パスワード" class="auth-input">
                </div>
                <button onclick="app.signIn()" class="auth-btn">ログイン</button>
            </div>

            <!-- サインアップフォーム -->
            <div id="signupTab" class="auth-tab-content" style="display: none;">
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" id="signupEmail" placeholder="example@email.com" class="auth-input">
                </div>
                <div class="form-group">
                    <label>パスワード</label>
                    <input type="password" id="signupPassword" placeholder="パスワード（6文字以上）" class="auth-input">
                </div>
                <button onclick="app.signUp()" class="auth-btn">サインアップ</button>
            </div>
        </div>
    </div>

    <!-- アプリメインUI -->
    <div id="appContent" class="container">
        <div class="app">
            <div class="app-header">
                <h1>📝 My To Do List</h1>
                <button id="logoutBtn" class="logout-btn">ログアウト</button>
            </div>

            <div class="input-section">
                <input
                    type="text"
                    id="taskInput"
                    class="task-input"
                    placeholder="新しいタスクを入力..."
                    autocomplete="off"
                >
                <select id="categorySelect" class="category-select">
                    <option value="other">その他</option>
                    <option value="work">💼 仕事</option>
                    <option value="personal">👤 プライベート</option>
                    <option value="shopping">🛒 買い物</option>
                    <option value="health">💪 健康</option>
                </select>
                <button id="voiceBtn" class="voice-btn" title="音声入力">🎤</button>
                <button id="addBtn" class="add-btn">追加</button>
            </div>

            <div class="filter-section">
                <div class="filters">
                    <h3>ステータス</h3>
                    <button class="filter-btn active" data-filter="all">すべて</button>
                    <button class="filter-btn" data-filter="active">未完了</button>
                    <button class="filter-btn" data-filter="completed">完了</button>
                </div>

                <div class="categories">
                    <h3>カテゴリー</h3>
                    <button class="category-btn active" data-category="all">すべて</button>
                    <button class="category-btn" data-category="work">💼 仕事</button>
                    <button class="category-btn" data-category="personal">👤 プライベート</button>
                    <button class="category-btn" data-category="shopping">🛒 買い物</button>
                    <button class="category-btn" data-category="health">💪 健康</button>
                    <button class="category-btn" data-category="other">📌 その他</button>
                </div>
            </div>

            <ul id="taskList" class="task-list"></ul>

            <div class="stats">
                <span id="activeCount">0</span> 個の未完了タスク
                <button id="clearBtn" class="clear-btn">完了したタスクを削除</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        function switchAuthTab(tab) {
            document.getElementById('loginTab').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('signupTab').style.display = tab === 'signup' ? 'block' : 'none';

            document.querySelectorAll('.auth-tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(tab === 'login' ? 'ログイン' : 'サインアップ'));
            });
        }
    </script>
</body>
</html>
